<!DOCTYPE html>
<html>

<head>

<title>Flipkart Review Sentiment Analyzer</title>

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:600px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#333;
margin-bottom:20px;
}

textarea{
width:100%;
height:140px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:15px;
background:#5a67d8;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#434190;
}

.result{
margin-top:25px;
font-size:22px;
font-weight:bold;
}

.positive{
color:green;
}

.negative{
color:red;
}

.neutral{
color:orange;
}

.confidence{
margin-top:10px;
font-size:16px;
color:#555;
}

</style>

</head>


<body>

<div class="container">

<h1>Flipkart Review Sentiment Analyzer</h1>

<form action="/predict" method="post">

<textarea name="review" placeholder="Write your product review here..."></textarea>

<br>

<button type="submit">Analyze Review</button>

</form>


{% if prediction %}

<div class="result 
{% if prediction=='Positive' %}positive
{% elif prediction=='Negative' %}negative
{% else %}neutral
{% endif %}">

Sentiment: {{ prediction }}

</div>

<div class="confidence">

Confidence Score: {{ confidence }} %

</div>

{% endif %}

</div>

</body>
</html>
